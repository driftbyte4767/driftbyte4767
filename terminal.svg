<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title-bar { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      .title-text { fill: #8b949e; font-family: monospace; font-size: 12px; }
      .prompt { fill: #58a6ff; font-family: monospace; font-size: 13px; }
      .cmd { fill: #e6edf3; font-family: monospace; font-size: 13px; }
      .text { fill: #c9d1d9; font-family: monospace; font-size: 13px; }
      .muted { fill: #8b949e; font-family: monospace; font-size: 13px; }
      .cursor {
        fill: #e6edf3;
        animation: blink 1.2s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="680" height="260" rx="8" class="bg"/>
  <rect width="680" height="36" rx="8" class="title-bar"/>
  <rect y="20" width="680" height="16" class="title-bar"/>
  <rect width="680" height="260" rx="8" class="border"/>

  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>

  <text x="340" y="23" text-anchor="middle" class="title-text">bash — driftbyte@github</text>

  <text x="24" y="68">
    <tspan class="prompt">driftbyte@github</tspan>
    <tspan class="muted">:</tspan>
    <tspan class="prompt">~</tspan>
    <tspan class="muted">$ </tspan>
    <tspan class="cmd">whoami</tspan>
  </text>

  <rect x="120" y="55" width="8" height="15" class="cursor"/>

  <text x="24" y="100" class="text">Young developer, passionate about understanding how things</text>
  <text x="24" y="118" class="text">actually work — what's really happening beneath the surface.</text>

  <text x="24" y="148" class="text">Former EPITA student, now rebuilding a solid CS foundation</text>
  <text x="24" y="166" class="text">before a CS degree (incoming). Learning by doing.</text>
  <text x="24" y="184" class="text">Experimenting, breaking things, understanding why.</text>

  <text x="24" y="214" class="muted">Most of what you'll find here reflects personal progression.</text>
  <text x="24" y="232" class="muted">Feedback is always welcome.</text>

</svg>
