<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title-bar { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      .title-text { fill: #8b949e; font-family: monospace; font-size: 12px; }
      .prompt { fill: #58a6ff; font-family: monospace; font-size: 13px; }
      .cmd { fill: #e6edf3; font-family: monospace; font-size: 13px; }
      .label { fill: #c9d1d9; font-family: monospace; font-size: 12px; }
      .status { fill: #8b949e; font-family: monospace; font-size: 11px; }
      .bar-bg { fill: #21262d; }
      .bar-high { fill: #e6edf3; }
      .bar-mid { fill: #8b949e; }
      .bar-low { fill: #3d444d; }
      .cursor { fill: #e6edf3; animation: blink 1.2s step-end infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </defs>

  <rect width="680" height="300" rx="8" class="bg"/>
  <rect width="680" height="36" rx="8" class="title-bar"/>
  <rect y="20" width="680" height="16" class="title-bar"/>
  <rect width="680" height="300" rx="8" class="border"/>

  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>
  <text x="340" y="23" text-anchor="middle" class="title-text">bash — driftbyte@github</text>

  <text x="24" y="68">
    <tspan class="prompt">driftbyte@github</tspan>
    <tspan class="status">:</tspan>
    <tspan class="prompt">~</tspan>
    <tspan class="status">$ </tspan>
    <tspan class="cmd">cat currently.md</tspan>
  </text>
  <rect x="192" y="55" width="8" height="15" class="cursor"/>

  <!-- Python -->
  <text x="24" y="102" class="label">Python — algo &amp; fundamentals</text>
  <text x="490" y="102" class="status">active · month 1</text>
  <rect x="24" y="108" width="560" height="5" rx="3" class="bar-bg"/>
  <rect x="24" y="108" width="480" height="5" rx="3" class="bar-high"/>

  <!-- LeetCode / Exercism -->
  <text x="24" y="136" class="label">LeetCode + Exercism — daily practice</text>
  <text x="490" y="136" class="status">active · daily</text>
  <rect x="24" y="142" width="560" height="5" rx="3" class="bar-bg"/>
  <rect x="24" y="142" width="420" height="5" rx="3" class="bar-high"/>

  <!-- Algo & structures -->
  <text x="24" y="170" class="label">Algorithms &amp; data structures</text>
  <text x="490" y="170" class="status">active · month 1</text>
  <rect x="24" y="176" width="560" height="5" rx="3" class="bar-bg"/>
  <rect x="24" y="176" width="360" height="5" rx="3" class="bar-mid"/>

  <!-- C -->
  <text x="24" y="204" class="label">C — memory, pointers, systems</text>
  <text x="490" y="204" class="status">incoming · month 2</text>
  <rect x="24" y="210" width="560" height="5" rx="3" class="bar-bg"/>
  <rect x="24" y="210" width="120" height="5" rx="3" class="bar-low"/>

  <!-- SQL -->
  <text x="24" y="238" class="label">SQL + backend web</text>
  <text x="490" y="238" class="status">planned · month 3-4</text>
  <rect x="24" y="244" width="560" height="5" rx="3" class="bar-bg"/>
  <rect x="24" y="244" width="60" height="5" rx="3" class="bar-low"/>

  <!-- Objectif -->
  <text x="24" y="278" class="status">→  objective : solid CS foundations before licence — sept. 2025</text>

</svg>
